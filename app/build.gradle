apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-kapt'

android {
    namespace "com.radwrld.wami"
    compileSdk 34

    defaultConfig {
        applicationId "com.radwrld.wami"
        minSdk 27
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        viewBinding true
        dataBinding true // Note: You have both viewBinding and dataBinding enabled. Ensure this is intentional.
    }
}

// It's a modern convention to define the kotlin version in one place
// and use it for the toolchain, but your current setup is fine.
kotlin {
    jvmToolchain(17)
}

dependencies {
    // --- Add the Lifecycle ViewModel KTX dependency HERE ---
    implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0" // Or the latest version
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.7.0" // Often useful with viewModelScope

    // ZXing core for QR generation
    implementation 'com.google.zxing:core:3.4.1'

    // Kotlin + AndroidX
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.10" // Consider updating to a newer Kotlin version if possible
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.0'
    implementation 'androidx.annotation:annotation:1.7.1'
    implementation 'com.squareup.picasso:picasso:2.8'

    // Image loading
    implementation 'com.github.bumptech.glide:glide:4.15.1'
    kapt 'com.github.bumptech.glide:compiler:4.15.1'
    implementation 'de.hdodenhof:circleimageview:3.1.0'

    // Retrofit for REST API calls
    implementation "com.squareup.retrofit2:retrofit:2.9.0"
    implementation "com.squareup.retrofit2:converter-gson:2.9.0"
    implementation "com.squareup.retrofit2:converter-scalars:2.9.0"

    // OkHttp / Okio
    implementation("com.squareup.okhttp3:okhttp:4.10.0")
    // The explicit exclude/include for okio is generally not needed with recent gradle versions
    // but is harmless if it resolves a specific dependency conflict in your project.
    implementation "com.squareup.okio:okio:3.5.0"

    // Logging Interceptor
    implementation "com.squareup.okhttp3:logging-interceptor:4.10.0"

    // Socket.IO client
    implementation("io.socket:socket.io-client:2.0.1") {
        exclude group: 'org.json', module: 'json'
    }

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.3'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
}
